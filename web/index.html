<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrow Escape</title>
<!-- 파비콘: 인라인 SVG(외부 파일 없이 자립) — 어두운 판 배경 + 탈출하는 민트 화살표.
     이 link 가 있으면 브라우저가 /favicon.ico 를 기본 요청하지 않아 404 도 사라진다. -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231b1d28'/%3E%3Cpath d='M9 24 V15 H17' fill='none' stroke='%238df0d5' stroke-width='4.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M15 9 L25 15 L15 21 Z' fill='%238df0d5'/%3E%3C/svg%3E">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #1b1d28;
    color: #e8eaf2;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    display: flex; flex-direction: column;
    /* 안전영역 여백: 기본 0(웹·mac 무영향). 안드로이드 앱이 상태바·내비바 높이를
       --safe-top/--safe-bottom 으로 주입하면 그만큼 밀려 시스템 바와 안 겹친다. */
    padding-top: var(--safe-top, 0px);
    padding-bottom: var(--safe-bottom, 0px);
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; flex: 0 0 auto;
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .stats { display: flex; gap: 20px; font-size: 13px; color: #aab0c5; align-items: baseline; }
  .stats b { color: #8df0d5; font-variant-numeric: tabular-nums; font-size: 22px; font-weight: 800; margin-left: 3px; }
  .stats b.low { color: #e0447a; }        /* 타임어택 시간 부족 경고 */
  .icon-btn.active { color: #8df0d5; background: #3a3f58; }  /* 타임어택 켜짐 */
  button {
    background: #2e3245; color: #e8eaf2; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 14px; cursor: pointer; font-family: inherit;
  }
  button:hover { background: #3a3f58; }
  .icon-btn {
    padding: 8px; display: inline-flex; align-items: center; justify-content: center;
    color: #aab0c5;
  }
  .icon-btn:hover { color: #e8eaf2; }
  .icon-btn svg { width: 20px; height: 20px; display: block; }
  #stage { flex: 1 1 auto; position: relative; }
  canvas { position: absolute; inset: 0; cursor: pointer; }
  #overlay {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center; flex-direction: column; gap: 16px;
    background: rgba(20, 22, 33, 0.75); backdrop-filter: blur(3px);
  }
  #overlay.show { display: flex; }
  #overlay .msg { font-size: 34px; font-weight: 800; color: #8df0d5; }
  #overlay .stars { font-size: 44px; letter-spacing: 6px; color: #f5c84c; }
  #overlay .stars .off { color: #3a3f58; }
  #overlay .sub { font-size: 15px; color: #aab0c5; text-align: center; line-height: 1.7; }
  #overlay button { background: #8df0d5; color: #1b1d28; font-weight: 700; padding: 10px 24px; }
  .btns { display: flex; gap: 8px; }
  #comboEl b { color: #f5c84c; }

  /* 좁은 화면(폰): 헤더를 2줄로 — 1줄 [제목 … 버튼], 2줄 [스탯 가운데].
     내부 줄바꿈은 막고(nowrap) 폰트·여백을 줄여 깔끔하게 맞춘다. */
  @media (max-width: 600px) {
    header { flex-wrap: wrap; padding: 10px 14px; }
    header h1 { font-size: 16px; white-space: nowrap; }
    .btns { margin-left: auto; }
    button { padding: 7px 12px; font-size: 13px; white-space: nowrap; }
    .icon-btn { padding: 7px; }
    .stats { order: 3; flex-basis: 100%; justify-content: center; margin-top: 8px; gap: 22px; }
  }
</style>
</head>
<body>
<header>
  <h1>ARROW ESCAPE</h1>
  <div class="stats">
    <span>레벨 <b id="levelEl">1</b></span>
    <span>점수 <b id="scoreEl">0</b></span>
    <span id="timeEl" style="display:none">시간 <b id="timeVal">1:00</b></span>
    <span id="comboEl" style="display:none">콤보 <b id="comboX">×2</b></span>
  </div>
  <div class="btns">
    <button id="modeBtn" class="icon-btn" title="타임어택 모드 켜기/끄기" aria-label="타임어택 모드"></button>
    <button id="muteBtn" class="icon-btn" title="소리 켜기/끄기" aria-label="소리 켜기/끄기"></button>
    <button id="newBtn">새 퍼즐</button>
  </div>
</header>
<div id="stage">
  <canvas id="cv"></canvas>
  <div id="overlay">
    <div class="msg">CLEAR!</div>
    <div class="stars" id="starsEl"></div>
    <div class="sub" id="clearSub"></div>
    <button id="againBtn">다음 레벨 ▶</button>
  </div>
</div>

<script>
'use strict';

let COLS = 11, ROWS = 11;
const COLORS = ['#8df0d5', '#9257d6', '#4d8fd1', '#c73a6a', '#5aa233', '#5bc8e8'];
const DIRS = [{dr:-1,dc:0},{dr:1,dc:0},{dr:0,dc:-1},{dr:0,dc:1}];

// ---------- 레벨 & 판 모양 ----------

const SHAPES = ['square', 'heart', 'tree', 'circle', 'diamond', 'bear', 'house'];

// 구역(zone)별 색상 팔레트 — 화살표는 자기 구역 안에서만 만들어지고 그 구역의 색을 입는다
const PALETTES = {
  multi:      COLORS,
  heartRed:   ['#e0447a', '#c73a6a', '#f06fa0', '#a82f57'],
  leaf:       ['#4e8a3d', '#5aa233', '#79b84a', '#3f7a33'],
  trunk:      ['#8a5a33', '#a06b3d'],
  bearBrown:  ['#a06b3d', '#8a5a33', '#c08a52', '#75482a'],
  bearMuzzle: ['#e8d5b8', '#d9c09a'],
  houseRoof:  ['#d0453f', '#e0574a', '#b83a35', '#c94a44'],
  houseWall:  ['#cfa257', '#e0b46a', '#b98a42', '#d9ad5c'],
};

let level = 1;
let mask = [];       // mask[r][c] = 화살표를 놓을 수 있는 칸인지
let zones = [];      // zones[r][c] = 구역 키(팔레트) 또는 null
let zoneCount = {};  // 구역 키 → 칸 수 (작은 구역은 일부 금지 규칙에서 제외)

function levelCfg(lv) {
  // 첫 판부터 12×12, 레벨마다 +2 씩 커져 최대 28×28. 모양은 7개를 계속 순환.
  const size = Math.min(28, 10 + lv * 2);
  return {
    size,
    shape: SHAPES[(lv - 1) % SHAPES.length],
    straightBias: Math.max(0.15, 0.5 - lv * 0.04),  // 레벨이 오를수록 더 구불구불
    maxLen: Math.min(20, 12 + lv),
  };
}

// (u,v) = 칸 중심의 정규화 좌표(0~1). 구역 키를 돌려주고, 판 밖이면 null
function cellZone(shape, u, v) {
  const circ = (cx, cy, rad) => {
    const dx = u - cx, dy = v - cy;
    return dx * dx + dy * dy <= rad * rad;
  };
  switch (shape) {
    case 'square': return 'multi';
    case 'circle': return circ(0.5, 0.5, 0.48) ? 'multi' : null;
    case 'diamond': return Math.abs(u - 0.5) + Math.abs(v - 0.5) <= 0.52 ? 'multi' : null;
    case 'heart': {
      const x = (u - 0.5) * 2.7, y = (0.42 - v) * 2.7;
      const a = x * x + y * y - 1;
      return a * a * a - x * x * y * y * y <= 0 ? 'heartRed' : null;
    }
    case 'tree': {
      const ax = Math.abs(u - 0.5);
      if (v >= 0.83 && v <= 1.0 && ax <= 0.09) return 'trunk';
      if (v >= 0.02 && v <= 0.36 && ax <= 0.26 * (v - 0.02) / 0.34) return 'leaf';
      if (v >= 0.22 && v <= 0.62 && ax <= 0.36 * (v - 0.22) / 0.40) return 'leaf';
      if (v >= 0.46 && v <= 0.86 && ax <= 0.47 * (v - 0.46) / 0.40) return 'leaf';
      return null;
    }
    case 'bear': {
      if (circ(0.5, 0.72, 0.17)) return 'bearMuzzle'; // 주둥이
      if (circ(0.5, 0.58, 0.38)) return 'bearBrown';  // 얼굴
      if (circ(0.22, 0.22, 0.155) || circ(0.78, 0.22, 0.155)) return 'bearBrown'; // 귀
      return null;
    }
    case 'house': {
      const ax = Math.abs(u - 0.5);
      // 지붕: 위쪽 삼각형 (꼭대기 중앙 → 아래로 넓어짐), 처마가 벽보다 넓게 돌출
      if (v >= 0.06 && v <= 0.44 && ax <= 0.46 * (v - 0.06) / 0.38) return 'houseRoof';
      // 벽: 아래쪽 사각형
      if (v >= 0.44 && v <= 0.94 && ax <= 0.34) return 'houseWall';
      return null;
    }
  }
  return 'multi';
}

function buildMask(shape) {
  const m = Array.from({length: ROWS}, () => new Array(COLS).fill(false));
  const z = Array.from({length: ROWS}, () => new Array(COLS).fill(null));
  const cnt = {};
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    z[r][c] = cellZone(shape, (c + 0.5) / COLS, (r + 0.5) / ROWS);
    m[r][c] = z[r][c] !== null;
    if (z[r][c]) cnt[z[r][c]] = (cnt[z[r][c]] || 0) + 1;
  }
  return {mask: m, zones: z, zoneCount: cnt};
}

// ---------- 지형(터널): 포털 · 파이프 ----------
// 판에 고정된 지형. 화살표 몸통은 지형 칸에 배치될 수 없고, 탈출 광선만
// traceRay() 규칙에 따라 통과한다. 규칙 상세는 GENERATION_RULES.md 참조.

let terrain = [];   // terrain[r][c] = null | {type:'portal', pair, color} | {type:'pipe', pipe, enter}
let portals = [];   // [{a:{r,c}, b:{r,c}, color}]
let pipes = [];     // [{kind, lines:[{cells, d0, d1}], cells}]

const PORTAL_COLORS = ['#ffce3d', '#3be2f0', '#ff5ad1']; // 화살표 팔레트와 겹치지 않는 금·청록·자홍

function dirIdx(d) { return d.dr === -1 ? 0 : d.dr === 1 ? 1 : d.dc === -1 ? 2 : 3; }
function oppDir(d) { return {dr: -d.dr, dc: -d.dc}; }

// 포털 쌍·파이프 수: 레벨 1~4 → 1개, 5~8 → 2개, 9+ → 3개
function terrainCount(lv) { return Math.min(3, 1 + Math.floor((lv - 1) / 4)); }

// 파이프 모양(상대 좌표). lines = 관 내부 경로들: cells 순서가 곧 경로, d0/d1 은 양 끝 개구 방향.
// ㄱ/ㄴ 은 회전으로 서로 같은 모양이라 하나로 다루고, 무작위 회전(0~270°)을 적용한다.
function makePipeShape() {
  const U = {dr: -1, dc: 0}, D = {dr: 1, dc: 0}, L = {dr: 0, dc: -1}, R = {dr: 0, dc: 1};
  const kind = ['-', 'ㄱ', 'ㄴ', 'ㄷ', '+'][Math.floor(Math.random() * 5)];
  let lines;
  if (kind === '-') {
    const len = 3 + Math.floor(Math.random() * 3); // 3~5칸 직선 관통
    lines = [{cells: Array.from({length: len}, (_, i) => ({r: 0, c: i})), d0: L, d1: R}];
  } else if (kind === 'ㄱ' || kind === 'ㄴ') { // 팔 2+2(모서리 공유) → 90° 꺾임
    lines = [{cells: [{r: 0, c: 0}, {r: 0, c: 1}, {r: 1, c: 1}], d0: L, d1: D}];
  } else if (kind === 'ㄷ') { // 팔 2+3+2(모서리 공유) → 방향 반전
    lines = [{cells: [{r: 0, c: 1}, {r: 0, c: 0}, {r: 1, c: 0}, {r: 2, c: 0}, {r: 2, c: 1}], d0: R, d1: R}];
  } else { // '+' 5칸: 축별 독립 직진 관통
    lines = [
      {cells: [{r: 0, c: 1}, {r: 1, c: 1}, {r: 2, c: 1}], d0: U, d1: D},
      {cells: [{r: 1, c: 0}, {r: 1, c: 1}, {r: 1, c: 2}], d0: L, d1: R},
    ];
  }
  // 무작위 회전: (r,c) → (c,-r), 방향도 같은 변환 후 좌표를 0 기준으로 정규화
  const rot = Math.floor(Math.random() * 4);
  for (let k = 0; k < rot; k++) {
    for (const ln of lines) {
      ln.cells = ln.cells.map(p => ({r: p.c, c: -p.r}));
      ln.d0 = {dr: ln.d0.dc, dc: -ln.d0.dr};
      ln.d1 = {dr: ln.d1.dc, dc: -ln.d1.dr};
    }
  }
  const all = lines.flatMap(ln => ln.cells);
  const minR = Math.min(...all.map(p => p.r)), minC = Math.min(...all.map(p => p.c));
  for (const ln of lines) ln.cells = ln.cells.map(p => ({r: p.r - minR, c: p.c - minC}));
  return {kind, lines};
}

function registerPipe(sh, r0, c0) {
  const pipe = {kind: sh.kind, lines: [], cells: []};
  const seen = new Set();
  for (const ln of sh.lines) {
    const cells = ln.cells.map(p => ({r: p.r + r0, c: p.c + c0}));
    pipe.lines.push({cells, d0: ln.d0, d1: ln.d1});
    for (const p of cells) {
      const key = p.r * COLS + p.c;
      if (seen.has(key)) continue; // '+' 의 중심 칸 중복 제거
      seen.add(key);
      pipe.cells.push(p);
      terrain[p.r][p.c] = {type: 'pipe', pipe, enter: {}};
    }
  }
  // 셀별 통과 규칙 사전 계산: 열린 입구에 정방향(개구의 반대 방향)으로 진입할 때만
  // 내부 경로를 따라 반대쪽 출구 방향으로 나간다. 그 외(옆면·역방향)는 enter 미등록 = 벽.
  for (const ln of pipe.lines) {
    const a = ln.cells[0], b = ln.cells[ln.cells.length - 1];
    terrain[a.r][a.c].enter[dirIdx(oppDir(ln.d0))] = {path: ln.cells, outDir: ln.d1};
    terrain[b.r][b.c].enter[dirIdx(oppDir(ln.d1))] = {path: [...ln.cells].reverse(), outDir: ln.d0};
  }
  pipes.push(pipe);
}

// newGame 에서 화살표보다 먼저 실행. 배치에 실패한 지형은 그냥 건너뛴다(수는 최선 노력).
function placeTerrain() {
  terrain = Array.from({length: ROWS}, () => new Array(COLS).fill(null));
  portals = [];
  pipes = [];
  const n = terrainCount(level);
  const nearTerrain = (r, c) => { // 지형끼리 최소 1칸 간격 확보용
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      if (inGrid(r + dr, c + dc) && terrain[r + dr][c + dc]) return true;
    }
    return false;
  };
  // 포털 칸 조건: 가장자리 1칸 이내 금지(무의미한 포털 방지),
  // 작은 구역(해·구름 등 30칸 미만) 금지(그림 보호)
  const portalOk = (r, c) =>
    mask[r][c] && !nearTerrain(r, c) &&
    Math.min(r, c, ROWS - 1 - r, COLS - 1 - c) >= 2 &&
    (zoneCount[zones[r][c]] || 0) >= 30;
  for (let i = 0; i < n; i++) {
    for (let tryN = 0; tryN < 300; tryN++) {
      const a = {r: Math.floor(Math.random() * ROWS), c: Math.floor(Math.random() * COLS)};
      const b = {r: Math.floor(Math.random() * ROWS), c: Math.floor(Math.random() * COLS)};
      if (!portalOk(a.r, a.c) || !portalOk(b.r, b.c)) continue;
      if (a.r === b.r || a.c === b.c) continue;                  // 같은 행/열 일직선 쌍 → 광선 순환 위험
      if (Math.hypot(a.r - b.r, a.c - b.c) < COLS / 3) continue; // 판 크기의 1/3 이상 떨어뜨림
      const color = PORTAL_COLORS[portals.length % PORTAL_COLORS.length];
      terrain[a.r][a.c] = {type: 'portal', pair: b, color};
      terrain[b.r][b.c] = {type: 'portal', pair: a, color};
      portals.push({a, b, color});
      break;
    }
  }
  for (let i = 0; i < n; i++) {
    for (let tryN = 0; tryN < 300; tryN++) {
      const sh = makePipeShape();
      const all = sh.lines.flatMap(ln => ln.cells);
      const maxR = Math.max(...all.map(p => p.r)), maxC = Math.max(...all.map(p => p.c));
      const r0 = Math.floor(Math.random() * (ROWS - maxR));
      const c0 = Math.floor(Math.random() * (COLS - maxC));
      if (!all.every(p => mask[p.r + r0][p.c + c0] && !nearTerrain(p.r + r0, p.c + c0))) continue;
      registerPipe(sh, r0, c0);
      break;
    }
  }
}

// 공용 광선 추적기 — 이 함수가 곧 탈출 광선의 게임 규칙이다.
// start(포함 안 함)에서 dir 방향으로 나아가며 머리가 지나갈 칸 목록을 만든다.
// 빈 칸: 직진. 포털 칸: 짝 칸으로 점프(jump=true 표시) 후 같은 방향으로 직진.
// 파이프: 열린 입구에 정방향으로 닿을 때만 내부 경로를 따라 반대쪽 출구 방향으로
// 나가고, 옆면·역방향은 벽. 포털 순환은 (칸,방향) 방문 집합으로 감지해 벽 처리.
// grid 를 주면 다른 화살표 칸에서 조기 종료(end='hit') — 생성 핫패스 최적화.
// 반환: {cells:[{r,c,jump?}...], end:'exit'|'wall'|'hit', endDir}
//   벽/충돌을 일으킨 칸은 목록에 넣지 않는다. 거리 d = 목록 인덱스+1 (포털 점프도 1칸).
function traceRay(start, dir, grid, selfId) {
  const cells = [];
  let r = start.r, c = start.c, d = dir;
  let seen = null; // 지형을 만날 때만 기록 — 순환은 지형 없이는 불가능
  while (true) {
    r += d.dr; c += d.dc;
    if (!inGrid(r, c)) return {cells, end: 'exit', endDir: d};
    const t = terrain[r][c];
    if (t) {
      const key = (r * COLS + c) * 4 + dirIdx(d);
      if (!seen) seen = new Set();
      if (seen.has(key)) return {cells, end: 'wall', endDir: d}; // 광선 순환 → 막힘
      seen.add(key);
      if (t.type === 'portal') {
        cells.push({r, c});
        cells.push({r: t.pair.r, c: t.pair.c, jump: true});
        r = t.pair.r; c = t.pair.c;
        continue;
      }
      const en = t.enter[dirIdx(d)];
      if (!en) return {cells, end: 'wall', endDir: d}; // 파이프 옆면·역방향
      for (const p of en.path) cells.push({r: p.r, c: p.c});
      const last = en.path[en.path.length - 1];
      r = last.r; c = last.c; d = en.outDir;
      continue;
    }
    if (grid && grid[r][c] !== -1 && grid[r][c] !== selfId) return {cells, end: 'hit', endDir: d};
    cells.push({r, c});
  }
}

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// ---------- 퍼즐 생성 ----------

function inGrid(r, c) { return r >= 0 && r < ROWS && c >= 0 && c < COLS; }

function makeOcc() {
  return Array.from({length: ROWS}, () => new Array(COLS).fill(-1));
}

function randomWalk(grid, start, target, straightBias) {
  const path = [start];
  const visited = new Set([start.r * COLS + start.c]);
  const zone = zones[start.r][start.c]; // 화살표는 자기 구역 안에서만 이동 (그림의 경계가 살아남)
  let prevDir = null;
  while (path.length < target) {
    const head = path[path.length - 1];
    const options = DIRS.filter(d => {
      const r = head.r + d.dr, c = head.c + d.dc;
      return inGrid(r, c) && zones[r][c] === zone && !terrain[r][c] && grid[r][c] === -1 && !visited.has(r * COLS + c);
    });
    if (options.length === 0) break;
    let d;
    if (path.length === target - 1 && Math.random() < 0.7) {
      // 마지막 걸음은 판 중앙 쪽을 향하게 → 탈출 경로가 중앙을 가로지르는 머리가 많아짐
      const cr = (ROWS - 1) / 2, cc = (COLS - 1) / 2;
      d = options.reduce((bst, o) =>
        (o.dr * (cr - head.r) + o.dc * (cc - head.c) >
         bst.dr * (cr - head.r) + bst.dc * (cc - head.c)) ? o : bst);
    } else if (prevDir && options.some(o => o.dr === prevDir.dr && o.dc === prevDir.dc) && Math.random() < straightBias) {
      // 직진 선호도가 낮을수록 더 구불구불해짐 (레벨이 오르면 낮아짐)
      d = prevDir;
    } else {
      d = options[Math.floor(Math.random() * options.length)];
    }
    const next = {r: head.r + d.dr, c: head.c + d.dc};
    visited.add(next.r * COLS + next.c);
    path.push(next);
    prevDir = d;
  }
  return path;
}

function makeSnake(path, id) {
  const h = path[path.length - 1], p2 = path[path.length - 2];
  const pal = PALETTES[zones[path[0].r][path[0].c]] || COLORS;
  return {
    cells: path,
    dir: {dr: h.r - p2.r, dc: h.c - p2.c},
    color: pal[id % pal.length],
    state: 'idle',
    t: 0,
  };
}

// 역방향 구성: 화살표를 놓을 때마다 "이미 놓인 것들만 있는 상태에서 탈출 가능"한
// 것만 채택한다. 그러면 놓은 순서의 역순으로 클릭하면 반드시 전부 사라진다.
// 난이도: 후보 중 "지금 자유로운(바로 나갈 수 있는) 화살표의 탈출 경로"를
// 가장 많이 덮는 배치를 골라, 시작 시점에 클릭 가능한 화살표를 최소화한다.
function generateSnakes() {
  const cfg = levelCfg(level);
  const grid = makeOcc();
  const result = [];
  const rayMap = new Map();   // 칸 → 그 칸을 탈출 경로로 쓰는 '자유' 화살표 id 집합
  const rayCellsOf = [];      // id → 탈출 경로 칸 목록
  const freeSet = new Set();  // 현재 자유(바로 탈출 가능) 화살표 id

  const starts = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (mask[r][c] && !terrain[r][c]) starts.push({r, c});
  }
  // 배치 순서는 "바깥부터" (+약간의 무작위): 화살표는 놓인 순서의 역순으로 풀리므로
  // 바깥 화살표가 먼저 놓이면 ① 빈 판에서 중앙을 관통하는 긴 탈출 경로를 얻고
  // ② 그 경로가 나중 배치들로 덮여 게임 후반에야 풀린다. 즉 시작 시 클릭 가능한
  // 화살표는 안쪽에 생기고, "테두리부터 회전 클릭" 공략이 통하지 않는다.
  // 단, 안쪽까지 전부 바깥 우선으로 하면 중심부가 탈출로를 못 찾아 구멍이 나므로
  // 바깥 고리(반경 62% 밖)만 바깥 우선, 그 안쪽은 무작위 순서로 채운다
  const cr = (ROWS - 1) / 2, cc = (COLS - 1) / 2;
  const R = Math.hypot(cr, cc);
  const ring = 0.62;
  for (const s of starts) {
    const d = Math.hypot(s.r - cr, s.c - cc);
    const outer = d >= R * ring;
    s.key = (outer ? -d : -R * ring) + Math.random() * COLS * (outer ? 0.15 : 0.5);
  }
  starts.sort((a, b) => a.key - b.key);

  const coverageOf = (path) => {
    const cov = new Set();
    for (const p of path) {
      const ids = rayMap.get(p.r * COLS + p.c);
      if (ids) for (const x of ids) cov.add(x);
    }
    return cov;
  };

  // 여러 패스로 배치: 1차에서 남은 빈칸(주로 가장자리 화살표의 짧은 탈출 경로)을
  // 뒤 패스에서 덮는다. 후반 패스(pass≥2)에서는 짧은 화살표 감점을 풀어 빈틈을 최대한 메꾼다
  for (let pass = 0; pass < 5; pass++) {
  let placedInPass = false;
  // 후반 패스는 남은 빈칸이 적으니 더 끈질기게 시도
  const tries = pass >= 2 ? 45 : 30;
  for (const start of starts) {
    if (grid[start.r][start.c] !== -1) continue;

    let best = null; // {snake, path, cov, score}
    for (let tryN = 0; tryN < tries; tryN++) {
      // 재시도할수록 짧은 화살표를 시도해 빈틈을 메꾼다 (최소 3칸 목표)
      const maxLen = tryN < 10 ? cfg.maxLen - 2 : 6;
      const target = 3 + Math.floor(Math.random() * Math.max(1, maxLen - 1));
      const path = randomWalk(grid, start, target, cfg.straightBias);
      if (path.length < 2) break; // 사방이 막힌 외톨이 칸

      const id = result.length;
      for (const p of path) grid[p.r][p.c] = id;
      const bends = countBends(path);

      // 정방향/역방향 둘 다 평가해 더 많이 가로막는 쪽을 선택.
      // 탈출 경로가 안쪽으로 길게 향할수록(exitDist) 나중에 다른 화살표가 덮기 쉬워 가산점.
      const cov = coverageOf(path);
      for (const cells of [path, [...path].reverse()]) {
        const snake = makeSnake(cells, id);
        const res = checkExit(snake, id, grid);
        if (!res.ok) continue;
        // traced 탈출 경로 위에서 "나중에 다른 화살표가 놓일 수 있는" 빈칸 수와
        // 판 중앙 원반(반지름 = 크기의 30%)을 통과하는 칸 수를 함께 계산.
        // 지형 칸은 화살표가 덮을 수 없으므로 rayEmpty 에서 제외한다.
        const h = cells[cells.length - 1];
        const rad = Math.max(2, COLS * 0.30);
        let rayEmpty = 0, centerCross = 0;
        for (const p of res.ray.cells) {
          if (mask[p.r][p.c] && !terrain[p.r][p.c] && grid[p.r][p.c] === -1) rayEmpty++;
          if (Math.hypot(p.r - cr, p.c - cc) <= rad) centerCross++;
        }
        // 금지 배치:
        //  - 탈출 경로에 덮일 수 있는 칸이 없어 영원히 못 막는 화살표 (rayEmpty === 0)
        //  - 머리가 가장자리 2칸 이내에서 바깥을 향하는 화살표 (exitDist <= 2)
        //  - 바깥 절반 영역에서 바깥쪽을 향하는 머리 (outwardHeadBanned)
        //  - 굴곡 없이 5칸 이상 뻗은 직선 화살표 (straightLong)
        const straightLong = bends === 0 && cells.length >= 5;
        const trivial = rayEmpty === 0 || res.exitDist <= 2 || outwardHeadBanned(h, snake.dir) || straightLong;
        // 감점(금지는 아님): 2칸 화살표(후반 패스에서는 빈틈 메꾸기용으로 허용),
        // 굴곡 없는 4칸 직선
        const lenPenalty = cells.length === 2 && pass < 2 ? 600 : 0;
        const straightPenalty = bends === 0 && cells.length === 4 ? 300 : 0;
        // 가로막기(cov)와 "중앙을 가로지르는 탈출 경로"를 함께 강하게 선호.
        // 생성 초반(중앙 통로가 비어 있을 때)에는 중앙 통과 탈출 경로를 사실상 필수로 요구
        const earlyQuota = result.length < starts.length / 14;
        const noCross = earlyQuota && centerCross === 0 ? 5000 : 0;
        const score = cov.size * 100 + centerCross * 30 + res.exitDist * 8 + cells.length + bends * 2
                    - noCross - lenPenalty - straightPenalty - (trivial ? 100000 : 0);
        if (!best || score > best.score) best = {snake, path: cells, cov, score, trivial, ray: res.ray};
      }
      for (const p of path) grid[p.r][p.c] = -1;

      if (best && best.cov.size >= 4) break; // 충분히 좋은 배치면 조기 종료
    }
    if (!best || best.trivial) continue; // 금지 배치뿐이면 그 자리는 비워둔다

    // 확정 배치
    const id = result.length;
    for (const p of best.path) grid[p.r][p.c] = id;
    result.push(best.snake);
    // traced 탈출 경로를 Set 으로 캐시 — onLaterRay() 가 행/열 산술 대신 소속 검사를 쓴다
    // (지형과 머리가 고정이므로 경로 불변, 머리 연장 시에만 갱신)
    best.snake.raySet = new Set(best.ray.cells.map(p => p.r * COLS + p.c));

    // 이번 배치로 탈출 경로가 덮인 화살표들은 더 이상 자유가 아님
    for (const bid of best.cov) {
      freeSet.delete(bid);
      for (const ci of rayCellsOf[bid]) {
        const ids = rayMap.get(ci);
        if (ids) { ids.delete(bid); if (ids.size === 0) rayMap.delete(ci); }
      }
    }
    // 새 화살표의 탈출 경로(나중에 화살표가 놓일 수 있는 빈칸만) 등록
    const rc = [];
    for (const p of best.ray.cells) {
      if (mask[p.r][p.c] && !terrain[p.r][p.c] && grid[p.r][p.c] === -1) rc.push(p.r * COLS + p.c);
    }
    rayCellsOf[id] = rc;
    freeSet.add(id);
    for (const ci of rc) {
      if (!rayMap.has(ci)) rayMap.set(ci, new Set());
      rayMap.get(ci).add(id);
    }
    placedInPass = true;
  }
  if (!placedInPass) break;
  }
  // '한눈에 보이는 공짜' = 자유이면서 traced 탈출 거리가 1~2칸인 화살표
  let obvious = 0;
  for (const id of freeSet) {
    const s = result[id];
    const h = s.cells[s.cells.length - 1];
    if (traceRay(h, s.dir).cells.length + 1 <= 2) obvious++;
  }
  return {snakes: result, occ: grid, freeCount: freeSet.size, obvious};
}

// 경로의 굴곡(방향 전환) 수
function countBends(cells) {
  let bends = 0;
  for (let i = 2; i < cells.length; i++) {
    if (cells[i].r - cells[i-1].r !== cells[i-1].r - cells[i-2].r ||
        cells[i].c - cells[i-1].c !== cells[i-1].c - cells[i-2].c) bends++;
  }
  return bends;
}

// 머리가 바깥 절반 영역(중심 반경 50% 밖)에서 중심 반대(바깥) 방향을 향하면 금지.
// 해·구름·나무기둥 같은 작은 구역(30칸 미만)은 그림 유지를 위해 제외.
function outwardHeadBanned(h, dir) {
  const cr = (ROWS - 1) / 2, cc = (COLS - 1) / 2;
  const hd = Math.hypot(h.r - cr, h.c - cc);
  if (hd <= Math.hypot(cr, cc) * 0.5) return false;
  if ((zoneCount[zones[h.r][h.c]] || 0) < 30) return false;
  return (dir.dr * (h.r - cr) + dir.dc * (h.c - cc)) / hd > 0.3;
}

// e 가 "나중에 놓인(=먼저 탈출해야 하는) 화살표"의 traced 탈출 경로 위 칸인지.
// 지형 때문에 행/열 산술 판정이 불가능해 배치 시점에 캐시한 raySet 소속 검사로 대체.
function onLaterRay(list, id, e) {
  const key = e.r * COLS + e.c;
  for (let t = id + 1; t < list.length; t++) {
    if (list[t].raySet.has(key)) return true;
  }
  return false;
}

// 자기 몸이 traced 탈출 경로를 막는지(j >= d 규칙). extra 는 아직 grid 에 없는 새 칸.
// 다른 화살표 너머의 자기충돌도 검사해야 하므로 grid 조기 종료 없이 전체를 추적한다.
function selfRayBlocked(cells, dir, grid, id, extra) {
  const head = cells[cells.length - 1];
  const ray = traceRay(head, dir);
  for (let i = 0; i < ray.cells.length; i++) {
    const p = ray.cells[i];
    if (grid[p.r][p.c] === id || (extra && p.r === extra.r && p.c === extra.c)) {
      const j = cells.findIndex(q => q.r === p.r && q.c === p.c);
      if (j >= i + 1) return true;
    }
  }
  return false;
}

// 머리 방향 traced 광선 위의 충돌 검사.
// 자기 몸이 앞을 막는 경우: path 인덱스 j칸은 t>j 에 비워지고 머리는 t=d 에 도착하므로
// j>=d 면 막힘 (d 는 포털 점프·파이프 굽이를 포함한 호 단위 거리).
// 지형 벽('wall')에 막히면 탈출 불가. 통과 시 res.ray 를 돌려줘 호출자가 재사용한다.
function checkExit(s, id, grid) {
  const head = s.cells[s.cells.length - 1];
  const ray = traceRay(head, s.dir, grid, id);
  for (let i = 0; i < ray.cells.length; i++) {
    const p = ray.cells[i];
    if (grid[p.r][p.c] === id) {
      const j = s.cells.findIndex(q => q.r === p.r && q.c === p.c);
      if (j >= i + 1) return {ok: false, hitDist: i + 1};
    }
  }
  if (ray.end !== 'exit') return {ok: false, hitDist: ray.cells.length + 1};
  return {ok: true, exitDist: ray.cells.length + 1, ray};
}

// 빈칸 메꾸기: 기존 화살표의 "꼬리"를 인접한 빈칸으로 연장한다.
// 머리(탈출 방향)는 그대로라 금지 규칙에 안 걸리고, 아래 두 조건이면 풀이 순서
// (놓인 역순)가 그대로 유효해 풀이 가능성이 유지된다.
function safeExtend(list, grid, id, e) {
  if (onLaterRay(list, id, e)) return false;
  // 꼬리가 늘면 몸통 인덱스가 1씩 밀려 자기충돌이 새로 생길 수 있어 재검사
  return !selfRayBlocked([e, ...list[id].cells], list[id].dir, grid, id, e);
}

// 머리 방향 연장: 화살표가 자기 탈출 통로로 한 칸 전진한 모양(몸이 늘어남).
// 남은 빈칸의 대부분은 탈출 통로 위의 칸이라 밀도를 크게 올린다.
function safeHeadExtend(list, grid, id, e) {
  const s = list[id];
  if (onLaterRay(list, id, e)) return false;
  // 금지 규칙 재검사: 새 머리 기준 traced exitDist > 2, 바깥 절반에서 바깥 향 금지
  const ray = traceRay(e, s.dir);
  if (ray.end !== 'exit' || ray.cells.length + 1 <= 2) return false;
  if (outwardHeadBanned(e, s.dir)) return false;
  // 굴곡 없는 화살표가 직선 5칸 이상이 되는 것 금지
  if (countBends(s.cells) === 0 && s.cells.length >= 4) return false;
  return !selfRayBlocked([...s.cells, e], s.dir, grid, id, null);
}

function fillGaps(gen) {
  const list = gen.snakes, grid = gen.occ;
  const cap = levelCfg(level).maxLen + 4; // 연장 길이 상한
  const backupCells = list.map(s => s.cells.map(p => ({r: p.r, c: p.c})));
  const backupOcc = grid.map(row => row.slice());
  let changed = true, guard = 0;
  while (changed && guard++ < ROWS * COLS) {
    changed = false;
    for (let id = 0; id < list.length; id++) {
      const s = list[id];
      if (s.cells.length >= cap) continue;
      // 1) 꼬리 연장
      const tail = s.cells[0];
      const zone = zones[tail.r][tail.c];
      let extended = false;
      for (const d of DIRS) {
        const r = tail.r + d.dr, c = tail.c + d.dc;
        if (!inGrid(r, c) || !mask[r][c] || terrain[r][c] || grid[r][c] !== -1 || zones[r][c] !== zone) continue;
        if (!safeExtend(list, grid, id, {r, c})) continue;
        s.cells.unshift({r, c});
        grid[r][c] = id;
        extended = true;
        break;
      }
      if (extended) { changed = true; continue; }
      // 2) 머리 방향 연장
      const head = s.cells[s.cells.length - 1];
      const e = {r: head.r + s.dir.dr, c: head.c + s.dir.dc};
      if (inGrid(e.r, e.c) && mask[e.r][e.c] && !terrain[e.r][e.c] && grid[e.r][e.c] === -1 &&
          zones[e.r][e.c] === zones[head.r][head.c] && safeHeadExtend(list, grid, id, e)) {
        s.cells.push(e);
        grid[e.r][e.c] = id;
        // 머리가 한 칸 전진 → traced 경로 캐시 갱신
        s.raySet = new Set(traceRay(e, s.dir).cells.map(p => p.r * COLS + p.c));
        changed = true;
      }
    }
  }
  if (!isSolvable(list)) { // 안전망: 문제가 생기면 전부 되돌림 (정상적으론 발생하지 않음)
    list.forEach((s, i) => { s.cells = backupCells[i]; });
    for (let r = 0; r < ROWS; r++) grid[r] = backupOcc[r];
    for (const s of list) { // 되돌린 머리 기준으로 raySet 도 복원
      const h = s.cells[s.cells.length - 1];
      s.raySet = new Set(traceRay(h, s.dir).cells.map(p => p.r * COLS + p.c));
    }
  }
}

// 추가 파종: 연장까지 끝난 보드의 남은 빈칸에 새 화살표를 한 번 더 심는다.
// 새 화살표는 "지금 상태에서 탈출 가능"해야 하고(마지막 순서로 추가되므로
// 가장 먼저 풀리면 됨) 모든 금지 규칙을 그대로 지킨다.
function reseed(gen) {
  const list = gen.snakes, grid = gen.occ;
  const cfg = levelCfg(level);
  const empties = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (mask[r][c] && !terrain[r][c] && grid[r][c] === -1) empties.push({r, c});
  }
  for (let i = empties.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [empties[i], empties[j]] = [empties[j], empties[i]];
  }
  for (const start of empties) {
    if (grid[start.r][start.c] !== -1) continue;
    let placed = null;
    for (let tryN = 0; tryN < 20 && !placed; tryN++) {
      const target = 3 + Math.floor(Math.random() * 8);
      const path = randomWalk(grid, start, target, cfg.straightBias);
      if (path.length < 3) break;
      if (countBends(path) === 0 && path.length >= 5) continue;
      const id = list.length;
      for (const p of path) grid[p.r][p.c] = id;
      for (const cells of [path, [...path].reverse()]) {
        const snake = makeSnake(cells, id);
        const res = checkExit(snake, id, grid);
        if (!res.ok || res.exitDist <= 2) continue;
        const h = cells[cells.length - 1];
        let rayEmpty = 0;
        for (const p of res.ray.cells) {
          if (mask[p.r][p.c] && !terrain[p.r][p.c] && grid[p.r][p.c] === -1) rayEmpty++;
        }
        if (rayEmpty === 0 || outwardHeadBanned(h, snake.dir)) continue;
        snake.raySet = new Set(res.ray.cells.map(p => p.r * COLS + p.c));
        placed = snake;
        break;
      }
      if (placed) list.push(placed);
      else for (const p of path) grid[p.r][p.c] = -1;
    }
  }
}

// 이용되지 않는 지형(파이프·포털) 제거: 완성된 보드를 탐욕 풀이로 시뮬레이션하며,
// 어떤 화살표의 탈출 광선도 통과하지 않는 파이프·포털은 순수 장식이므로 치운다.
// 풀 수 있는 판에서는 살아남는 화살표가 파이프 옆면(벽)에 영구히 막힐 수 없고(막히면
// 클리어 불가) 포털은 애초에 막지 않으므로, "통과 안 되는 지형"은 어떤 광선과도 무관
// → 제거해도 광선이 하나도 안 바뀌어 안전하다. 비워진 자리는 fillGaps 로 채운다.
function pruneUnusedTerrain(gen) {
  if (!pipes.length && !portals.length) return;
  const list = gen.snakes;
  const used = new Set();
  const sim = makeOcc();
  list.forEach((s, i) => s.cells.forEach(p => sim[p.r][p.c] = i));
  const alive = new Set(list.map((_, i) => i));
  let changed = true;
  while (changed && alive.size) {
    changed = false;
    for (const i of [...alive]) {
      const res = checkExit(list[i], i, sim);
      if (!res.ok) continue;
      for (const p of res.ray.cells) if (terrain[p.r][p.c]) used.add(p.r * COLS + p.c);
      list[i].cells.forEach(p => sim[p.r][p.c] = -1);
      alive.delete(i);
      changed = true;
    }
  }
  const keepPipes = pipes.filter(pipe => pipe.cells.some(p => used.has(p.r * COLS + p.c)));
  // 포털: 광선이 한쪽 칸에 들어가면 짝 칸까지 함께 traced 되므로 둘 중 하나만 확인해도 된다
  const keepPortals = portals.filter(po =>
    used.has(po.a.r * COLS + po.a.c) || used.has(po.b.r * COLS + po.b.c));
  if (keepPipes.length === pipes.length && keepPortals.length === portals.length) return;
  for (const pipe of pipes) if (!keepPipes.includes(pipe)) {
    for (const p of pipe.cells) terrain[p.r][p.c] = null; // 지형 해제 → 화살표가 놓일 수 있음
  }
  for (const po of portals) if (!keepPortals.includes(po)) {
    terrain[po.a.r][po.a.c] = null;
    terrain[po.b.r][po.b.c] = null;
  }
  pipes = keepPipes;
  portals = keepPortals;
  fillGaps(gen); // 비워진 지형 자리를 화살표 연장으로 메꾼다 (자체 isSolvable 안전망 포함)
}

// 탐욕 시뮬레이션: 나갈 수 있는 화살표를 반복 제거해서 전부 사라지면 풀 수 있는 퍼즐
function isSolvable(list) {
  const grid = makeOcc();
  list.forEach((s, i) => s.cells.forEach(p => grid[p.r][p.c] = i));
  const alive = new Set(list.map((_, i) => i));
  let changed = true;
  while (changed && alive.size > 0) {
    changed = false;
    for (const i of [...alive]) {
      if (checkExit(list[i], i, grid).ok) {
        list[i].cells.forEach(p => grid[p.r][p.c] = -1);
        alive.delete(i);
        changed = true;
      }
    }
  }
  return alive.size === 0;
}

function newGame() {
  const cfg = levelCfg(level);
  COLS = cfg.size;
  ROWS = cfg.size;
  ({mask, zones, zoneCount} = buildMask(cfg.shape));
  placeTerrain(); // 지형(포털·파이프)을 화살표보다 먼저 배치
  resize();

  const minSnakes = Math.max(6, Math.floor(mask.flat().filter(Boolean).length / 20));
  const attempts = 8;
  // 여러 후보 중 2단계 선택: 최대 밀도의 95% 안에 드는 보드 중에서
  // 시작 시 클릭 가능한(자유) 화살표가 가장 적은 것 (isSolvable 은 안전망)
  const cands = [];
  for (let attempt = 0; attempt < attempts; attempt++) {
    const gen = generateSnakes();
    if (gen.snakes.length < minSnakes || !isSolvable(gen.snakes)) continue;
    fillGaps(gen); // 연장까지 마친 최종 밀도로 후보를 비교한다
    gen.fill = gen.occ.flat().filter(v => v !== -1).length;
    cands.push(gen);
  }
  let best = null;
  if (cands.length > 0) {
    const maxFill = Math.max(...cands.map(g => g.fill));
    const dense = cands.filter(g => g.fill >= maxFill - COLS * ROWS * 0.05);
    // 한눈에 보이는 공짜 화살표가 적은 보드 우선, 그다음 자유 화살표 수
    const hardness = g => g.obvious * 3 + g.freeCount;
    best = dense.reduce((a, b) => (hardness(b) < hardness(a) ? b : a));
  }
  let gen = best;
  if (!gen) { gen = generateSnakes(); fillGaps(gen); }
  reseed(gen);              // 연장 후 남은 빈 통로에 새 화살표를 한 번 더 심고
  fillGaps(gen);            // 다시 연장해 빈틈을 마저 메꾸고
  pruneUnusedTerrain(gen);  // 어떤 화살표도 통과하지 않는 파이프·포털 제거
  snakes = gen.snakes;
  occ = gen.occ;
  moves = 0;
  remaining = snakes.length;
  startSnakes = snakes.length;
  budget = Math.ceil(startSnakes * 1.5);
  score = 0;
  combo = 0;
  particles = [];
  floats = [];
  shakeAmp = 0;
  slowmoT = 0;
  overlay.classList.remove('show');
  saveProgress();  // 이 레벨을 이어하기 지점으로 저장(일반 모드)
  updateHud();
}

function nextLevel() {
  level++;
  newGame();
}

function fmtTime(sec) {
  const s = Math.max(0, Math.ceil(sec));
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

function updateTimer() {
  const sec = Math.ceil(timeLeft);
  if (sec === lastShownSec) return;
  lastShownSec = sec;
  timeVal.textContent = fmtTime(timeLeft);
  timeVal.classList.toggle('low', timeLeft <= 10);
}

function updateHud() {
  levelEl.textContent = level.toLocaleString();
  scoreEl.textContent = score.toLocaleString();
  comboEl.style.display = combo >= 2 ? '' : 'none';
  comboX.textContent = `×${Math.min(combo, 5)}`;
  timeEl.style.display = timeAttack ? '' : 'none';
  if (timeAttack) { lastShownSec = -1; updateTimer(); }
}

// ---------- 사운드 (WebAudio — 파일 없이 코드로 합성) ----------

let audioCtx = null;
let muted = localStorage.getItem('ae_muted') === '1';

function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
  }
  // 모바일·WebView 는 사용자 제스처 전엔 suspended 로 시작 — 첫 클릭에서 재개해야 소리가 난다
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
}

function beep(freq, dur, type, vol, slideTo) {
  if (muted || !audioCtx) return;
  try {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(t);
    o.stop(t + dur);
  } catch {}
}

// 탈출음: 콤보가 쌓일수록 음정이 올라간다
function playEscape(comboN) {
  const f = 340 * Math.pow(1.07, Math.min(comboN, 12));
  beep(f, 0.16, 'triangle', 0.13, f * 1.5);
}
function playBump() { beep(150, 0.12, 'sawtooth', 0.14, 65); }
function playClear() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.2, 'triangle', 0.12), i * 90));
}

// ---------- 연출 (파티클 · 점수 텍스트 · 흔들림) ----------

function cellPx(p) {
  return {x: offX + (p.c + 0.5) * cell, y: offY + (p.r + 0.5) * cell};
}

function spawnEscapeFx(s, gained) {
  const head = cellPx(s.cells[s.cells.length - 1]);
  for (let i = 0; i < 12; i++) {
    const a = Math.random() * Math.PI * 2, sp = 60 + Math.random() * 160;
    particles.push({
      x: head.x, y: head.y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40,
      life: 0.55 + Math.random() * 0.25, color: s.color,
    });
  }
  floats.push({x: head.x, y: head.y - cell * 0.6, text: `+${gained.toLocaleString()}`, life: 1, color: s.color});
}

function updateFx(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 320 * dt; // 중력
  }
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i];
    f.life -= dt * 1.1;
    if (f.life <= 0) { floats.splice(i, 1); continue; }
    f.y -= 34 * dt;
  }
  shakeAmp = Math.max(0, shakeAmp - 26 * dt);
}

function drawFx() {
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.life * 2.5);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(1.5, cell * 0.1), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.font = `bold ${Math.max(14, cell * 0.9)}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  for (const f of floats) {
    ctx.globalAlpha = Math.min(1, f.life * 1.6);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

// ---------- 별점 ----------

// 낭비(충돌) 클릭 수 기준: 10% 이내 ★★★, 30% 이내 ★★, 예산 내 ★, 초과 시 0
function starsFor() {
  if (moves > budget) return 0;
  const waste = moves - startSnakes;
  if (waste <= Math.ceil(startSnakes * 0.1)) return 3;
  if (waste <= Math.ceil(startSnakes * 0.3)) return 2;
  return 1;
}

// ---------- 입력 ----------

function onClick(e) {
  if (gameOver) return;
  const rect = cv.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  const c = Math.floor((x - offX) / cell), r = Math.floor((y - offY) / cell);
  if (!inGrid(r, c)) return;
  const id = occ[r][c];
  if (id === -1) return;
  const s = snakes[id];
  if (s.state !== 'idle') return;

  moves++;
  const res = checkExit(s, id, occ);
  if (res.ok) {
    combo++;
    const gained = (10 + s.cells.length * 2) * Math.min(combo, 5); // 콤보 배율 최대 ×5
    score += gained;
    spawnEscapeFx(s, gained);
    playEscape(combo);

    s.state = 'exiting';
    s.t = 0;
    s.speed = 10;
    s.tEnd = (s.cells.length - 1) + res.exitDist + 2;
    s.cells.forEach(p => occ[p.r][p.c] = -1); // 자리를 즉시 비움
    remaining--;
    if (remaining === 0) {
      slowmoT = 0.9; // 마지막 화살표는 슬로모션으로
      totalScore += score;
      vibrate([0, 35, 40, 70]); // 클리어 햅틱
      if (timeAttack) {
        // 타임어택: 클리어 보너스 시간 + 자동으로 다음 레벨(오버레이 없이 계속 달린다)
        const bonus = taBonus();
        timeLeft += bonus;
        floats.push({x: stage.clientWidth / 2, y: 90, text: `+${bonus}s`, life: 1.4, color: '#8df0d5'});
        playClear();
        setTimeout(() => { level++; newGame(); }, 1400);
      } else {
        let newBest = false;
        if (totalScore > bestScore) {
          bestScore = totalScore;
          localStorage.setItem('ae_best_score', String(bestScore));
          newBest = true;
        }
        const stars = starsFor();
        setTimeout(() => {
          playClear();
          overlayMsg.textContent = 'CLEAR!';
          overlayMsg.style.color = '#8df0d5';
          againBtn.textContent = '다음 레벨 ▶';
          starsEl.innerHTML = '★'.repeat(stars) + `<span class="off">${'★'.repeat(3 - stars)}</span>`;
          clearSub.innerHTML =
            `레벨 ${level.toLocaleString()} 클리어 — 클릭 ${moves.toLocaleString()}/${budget.toLocaleString()}<br>` +
            `점수 <b style="color:#8df0d5">${score.toLocaleString()}</b> · 누적 ${totalScore.toLocaleString()}<br>` +
            (newBest ? `<b style="color:#f5c84c">🏆 최고 기록!</b>`
                     : `최고 ${bestScore.toLocaleString()}`);
          overlay.classList.add('show');
        }, 1200);
      }
    }
  } else {
    combo = 0;
    shakeAmp = 5;
    playBump();
    vibrate(25); // 충돌 햅틱
    if (timeAttack) timeLeft = Math.max(0.01, timeLeft - TA_BUMP); // 오클릭 시간 차감
    s.state = 'bump';
    s.t = 0;
    s.bumpPhase = 0;
    s.bumpFwd = Math.max(0.25, res.hitDist - 1 + 0.3);
  }
  updateHud();
}

cv.addEventListener('pointerdown', (e) => { ensureAudio(); onClick(e); });
document.getElementById('newBtn').addEventListener('click', newGame);
// 오버레이 버튼: 타임오버면 새 런 시작, 아니면 다음 레벨
againBtn.addEventListener('click', () => { if (gameOver) startRun(); else nextLevel(); });

// 새 런(레벨 1부터, 타임어택이면 시간 초기화)
function startRun() {
  level = 1;
  totalScore = 0;
  gameOver = false;
  timeLeft = timeAttack ? TA_INIT : 0;
  overlay.classList.remove('show');
  newGame();
}

// 시작·모드전환 진입점: 타임어택은 항상 새 런, 일반 모드는 저장된 진행 이어하기
function boot() {
  gameOver = false;
  overlay.classList.remove('show');
  if (timeAttack) {
    startRun();
  } else {
    level = Math.max(1, lsInt('ae_level', 1));
    totalScore = lsInt('ae_total', 0);
    timeLeft = 0;
    newGame();
  }
}

// 타임오버 오버레이
function showGameOver() {
  if (gameOver) return; // 중복 호출 방지
  gameOver = true;
  vibrate(140);
  playBump();
  let newBest = false;
  if (level > bestTaLevel) {
    bestTaLevel = level;
    localStorage.setItem('ae_best_ta_level', String(bestTaLevel));
    newBest = true;
  }
  overlayMsg.textContent = 'TIME OVER';
  overlayMsg.style.color = '#e0447a';
  starsEl.innerHTML = '';
  clearSub.innerHTML =
    `레벨 ${level.toLocaleString()} 도달 · 점수 <b style="color:#8df0d5">${totalScore.toLocaleString()}</b><br>` +
    (newBest ? `<b style="color:#f5c84c">🏆 최고 레벨!</b>`
             : `최고 레벨 ${bestTaLevel.toLocaleString()}`);
  againBtn.textContent = '다시 시작';
  overlay.classList.add('show');
}

// 타임어택 모드 토글 버튼 (스톱워치 아이콘)
const modeBtn = document.getElementById('modeBtn');
const ICON_CLOCK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2.5h6"/><circle cx="12" cy="13" r="8"/><path d="M12 9.5V13l2.4 1.7"/></svg>`;
function renderModeBtn() {
  modeBtn.innerHTML = ICON_CLOCK;
  modeBtn.classList.toggle('active', timeAttack);
  modeBtn.title = timeAttack ? '타임어택 모드 (켜짐)' : '타임어택 모드 (꺼짐)';
}
modeBtn.addEventListener('click', () => {
  timeAttack = !timeAttack;
  localStorage.setItem('ae_timeattack', timeAttack ? '1' : '0');
  renderModeBtn();
  // 타임어택 켜면 새 런, 끄면 저장된 일반 진행 이어하기
  boot();
});
renderModeBtn();

const muteBtn = document.getElementById('muteBtn');
// 모던 스피커 아이콘 (인라인 SVG, 이모지보다 플랫폼 간 일관됨). currentColor 로 색 상속.
const SPK_BODY = '<path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor" stroke="none"/>';
const ICON_ON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${SPK_BODY}<path d="M16 8.8a4.5 4.5 0 0 1 0 6.4"/><path d="M18.6 6.2a8 8 0 0 1 0 11.6"/></svg>`;
const ICON_OFF = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${SPK_BODY}<line x1="16" y1="9.5" x2="21" y2="14.5"/><line x1="21" y1="9.5" x2="16" y2="14.5"/></svg>`;
function renderMuteBtn() { muteBtn.innerHTML = muted ? ICON_OFF : ICON_ON; }
muteBtn.addEventListener('click', () => {
  muted = !muted;
  localStorage.setItem('ae_muted', muted ? '1' : '0');
  renderMuteBtn();
});
renderMuteBtn();

// ---------- 애니메이션 & 렌더링 ----------

function easeOut(p) { return 1 - (1 - p) * (1 - p); }

function update(dt) {
  for (let i = snakes.length - 1; i >= 0; i--) {
    const s = snakes[i];
    if (s.state === 'exiting') {
      s.speed = Math.min(s.speed + 60 * dt, 34);
      s.t += s.speed * dt;
      if (s.t >= s.tEnd) {
        snakes.splice(i, 1);
        // occ 에 저장된 인덱스 보정
        for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
          if (occ[r][c] > i) occ[r][c]--;
        }
      }
    } else if (s.state === 'bump') {
      s.bumpPhase += dt / 0.32;
      if (s.bumpPhase >= 1) {
        s.state = 'idle';
        s.t = 0;
      } else {
        const p = s.bumpPhase;
        const w = p < 0.5 ? easeOut(p * 2) : easeOut((1 - p) * 2);
        s.t = s.bumpFwd * w;
      }
    }
  }
}

function buildPts(s) {
  // 셀 중심 좌표 (꼬리→머리) + 머리 방향 traced 광선 연장.
  // 파이프 굽이는 폴리라인에 자연 포함되고(기차 연출), 포털 점프는 breaks 에
  // 도착 인덱스를 기록해 그리기에서 그 세그먼트를 건너뛴다(몸통 두 조각).
  const pts = s.cells.map(p => ({
    x: offX + (p.c + 0.5) * cell,
    y: offY + (p.r + 0.5) * cell,
  }));
  const breaks = [];
  const h = s.cells[s.cells.length - 1];
  const ray = traceRay(h, s.dir);
  let er = h.r, ec = h.c;
  for (const p of ray.cells) {
    if (p.jump) breaks.push(pts.length);
    pts.push({x: offX + (p.c + 0.5) * cell, y: offY + (p.r + 0.5) * cell});
    er = p.r; ec = p.c;
  }
  // 광선 끝(판 밖 또는 벽 방향)으로 직선 연장 — 몸 전체가 빠져나갈 여유 길이
  const d = ray.endDir;
  for (let k = 1; k <= s.cells.length + 6; k++) {
    pts.push({
      x: offX + (ec + d.dc * k + 0.5) * cell,
      y: offY + (er + d.dr * k + 0.5) * cell,
    });
  }
  return {pts, breaks};
}

function pointAt(pts, sArc) {
  const i = Math.max(0, Math.min(Math.floor(sArc), pts.length - 2));
  const f = sArc - i;
  return {
    x: pts[i].x + (pts[i + 1].x - pts[i].x) * f,
    y: pts[i].y + (pts[i + 1].y - pts[i].y) * f,
  };
}

function drawSnake(s) {
  const {pts, breaks} = buildPts(s);
  const len = s.cells.length - 1;
  const s0 = s.t, s1 = s.t + len;

  let color = s.color;
  if (s.state === 'bump') {
    // 부딪힐 때 살짝 밝게 번쩍
    const p = Math.sin(s.bumpPhase * Math.PI) * 0.55;
    const n = parseInt(s.color.slice(1), 16);
    const rr = (n >> 16) & 255, gg = (n >> 8) & 255, bb = n & 255;
    color = `rgb(${Math.round(rr + (255 - rr) * p)}, ${Math.round(gg + (255 - gg) * p)}, ${Math.round(bb + (255 - bb) * p)})`;
  }

  // 몸통 — 포털 점프 세그먼트(breaks[i]-1 → breaks[i])에서 끊어 조각별로 그린다
  ctx.strokeStyle = color;
  ctx.lineWidth = cell * 0.58;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  const pieces = [];
  let cur = s0;
  for (const b of breaks) {
    if (b <= cur) continue;
    if (b - 1 >= s1) break;
    if (b - 1 > cur) pieces.push([cur, b - 1]);
    cur = Math.max(cur, b);
  }
  if (cur < s1) pieces.push([cur, s1]);
  for (const [a0, a1] of pieces) {
    if (a1 - a0 < 0.01) continue;
    ctx.beginPath();
    const st = pointAt(pts, a0);
    ctx.moveTo(st.x, st.y);
    for (let v = Math.ceil(a0); v < a1; v++) ctx.lineTo(pts[v].x, pts[v].y);
    const en = pointAt(pts, a1);
    ctx.lineTo(en.x, en.y);
    ctx.stroke();
  }

  // 화살촉 — 머리가 있는 세그먼트의 방향. 점프 세그먼트 안(포털 통과 중)이면 생략
  const hi = Math.max(0, Math.min(Math.floor(s1), pts.length - 2));
  if (breaks.includes(hi + 1)) return;
  const head = pointAt(pts, s1);
  let dx = pts[hi + 1].x - pts[hi].x, dy = pts[hi + 1].y - pts[hi].y;
  const m = Math.hypot(dx, dy) || 1;
  dx /= m; dy /= m;
  const tipLen = cell * 0.46, halfW = cell * 0.46, back = cell * 0.1;
  const px = -dy, py = dx;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(head.x + dx * tipLen, head.y + dy * tipLen);
  ctx.lineTo(head.x - dx * back + px * halfW, head.y - dy * back + py * halfW);
  ctx.lineTo(head.x - dx * back - px * halfW, head.y - dy * back - py * halfW);
  ctx.closePath();
  ctx.fill();
}

// 파이프: 몸통(화살표 아래)과 윤곽·내부(화살표 위 반투명)를 두 번 그려
// 화살표가 "관 속을 지나가는" 느낌을 낸다. 양 끝은 평평하게(butt) 잘라 —
// 둥근 캡을 쓰면 끝이 볼록 튀어나와 (·) 캡슐로 보이므로 — 타원 마개(drawMouthOval)가
// 그 평평한 끝을 덮어 원통 관 입구가 되게 한다. 굽이(join)만 둥글게 유지.
function drawPipes(top) {
  ctx.lineJoin = 'round';
  ctx.lineCap = 'butt';
  // 파이프별로 모든 관(line)을 한 경로에 담는다 — '+' 교차가 단일 stroke 로 그려져
  // 알파가 중첩되지 않고(중앙만 어두워지지 않음) 나중 관의 벽이 먼저 관의 통로를
  // 덮지도 않아, 사방이 하나로 이어진 십자 관이 된다.
  const pipePath = (pipe) => {
    ctx.beginPath();
    for (const ln of pipe.lines) {
      const p0 = cellPx(ln.cells[0]), p1 = cellPx(ln.cells[ln.cells.length - 1]);
      ctx.moveTo(p0.x + ln.d0.dc * cell * 0.4, p0.y + ln.d0.dr * cell * 0.4);
      for (const p of ln.cells) { const q = cellPx(p); ctx.lineTo(q.x, q.y); }
      ctx.lineTo(p1.x + ln.d1.dc * cell * 0.4, p1.y + ln.d1.dr * cell * 0.4);
    }
  };
  // 1) 벽(밝은 슬레이트) 전체 → 2) 통로(어두운) 전체. 순서 덕에 교차에서 벽이 통로를 덮지 않는다.
  ctx.strokeStyle = '#707aa0';
  ctx.lineWidth = cell * 0.92;
  for (const pipe of pipes) { pipePath(pipe); ctx.stroke(); }
  ctx.strokeStyle = '#14161f';
  ctx.globalAlpha = top ? 0.8 : 1; // 위층은 살짝 비쳐 지나가는 화살표가 어른거린다
  ctx.lineWidth = cell * 0.64;
  for (const pipe of pipes) { pipePath(pipe); ctx.stroke(); }
  ctx.globalAlpha = 1;
}

// 파이프 입구: 각 열린 끝에 타원 마개(밝은 테두리 링 + 어두운 구멍)를 그린다.
// 원통 관을 옆에서 본 그림 = 직선 몸통 + 양 끝의 둥근 타원 구멍. 관을 정면으로
// 들여다보면 보이는 동그란 구멍처럼 보여 "여기가 트인 입구"임이 한눈에 읽히고,
// 옆면(벽)에는 타원이 없어 확실히 구분된다. 흐름 방향으로 납작하게(원근 축소).
function drawMouthOval(cellPos, d) {
  const m = cellPx(cellPos);
  const out = 0.4;                                    // 튜브 평평한 끝과 같은 위치에 마개를 얹는다
  const cx = m.x + d.dc * cell * out, cy = m.y + d.dr * cell * out;
  const rot = Math.atan2(d.dr, d.dc);                 // 흐름 방향 각도(화면 좌표)
  ctx.beginPath();
  ctx.ellipse(cx, cy, cell * 0.15, cell * 0.44, rot, 0, Math.PI * 2); // x=흐름(짧게) y=수직(벽폭에 맞춤)
  ctx.fillStyle = '#0b0c13';                          // 어두운 둥근 구멍
  ctx.fill();
  ctx.strokeStyle = '#aab4d8';                        // 밝은 테두리 링
  ctx.lineWidth = cell * 0.1;
  ctx.stroke();
}

function drawPipeMouths() {
  for (const pipe of pipes) for (const ln of pipe.lines) {
    drawMouthOval(ln.cells[0], ln.d0);
    drawMouthOval(ln.cells[ln.cells.length - 1], ln.d1);
  }
}

// 포털: 같은 쌍 = 같은 색의 이중 동그라미(◎ — 동심원 두 개). 어두운 구멍 위에
// 같은 색 원을 바깥·안쪽 두 개 그린다. 화살표 위에 그려 머리가 구멍으로
// 빨려 들어가는 느낌을 낸다.
function drawPortals() {
  for (const po of portals) {
    for (const p of [po.a, po.b]) {
      const {x, y} = cellPx(p);
      // 어두운 구멍(배경)
      ctx.fillStyle = '#0b0c13';
      ctx.beginPath();
      ctx.arc(x, y, cell * 0.42, 0, Math.PI * 2);
      ctx.fill();
      // 이중 동그라미 — 같은 색 동심원 두 개
      ctx.strokeStyle = po.color;
      ctx.lineWidth = cell * 0.09;
      ctx.beginPath();
      ctx.arc(x, y, cell * 0.4, 0, Math.PI * 2);   // 바깥 동그라미
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(x, y, cell * 0.24, 0, Math.PI * 2);  // 안쪽 동그라미
      ctx.stroke();
    }
  }
}

function resize() {
  const w = stage.clientWidth, h = stage.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  cv.width = w * dpr;
  cv.height = h * dpr;
  cv.style.width = w + 'px';
  cv.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cell = Math.floor(Math.min((w - 32) / COLS, (h - 32) / ROWS));
  offX = (w - cell * COLS) / 2;
  offY = (h - cell * ROWS) / 2;
}

function frame(now) {
  const raw = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  // 마지막 화살표 탈출은 슬로모션
  const dt = slowmoT > 0 ? raw * 0.35 : raw;
  if (slowmoT > 0) slowmoT -= raw;
  update(dt);
  updateFx(raw); // 파티클·텍스트·흔들림은 실제 시간으로

  // 타임어택 카운트다운 (플레이 중일 때만; 실제 시간 기준)
  if (timeAttack && !gameOver && remaining > 0) {
    timeLeft -= raw;
    updateTimer();
    if (timeLeft <= 0) { timeLeft = 0; updateTimer(); showGameOver(); }
  }

  const w = stage.clientWidth, h = stage.clientHeight;
  ctx.clearRect(0, 0, w, h);
  ctx.save();
  if (shakeAmp > 0.4) {
    ctx.translate((Math.random() * 2 - 1) * shakeAmp, (Math.random() * 2 - 1) * shakeAmp);
  }
  // 판 모양(하트/나무/곰돌이...) 실루엣을 살짝 밝게
  ctx.fillStyle = '#262939';
  const pad = cell * 0.14;
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (!mask[r][c]) continue;
    ctx.beginPath();
    ctx.roundRect(offX + c * cell - pad, offY + r * cell - pad, cell + pad * 2, cell + pad * 2, cell * 0.22);
    ctx.fill();
  }

  drawPipes(false); // 파이프 몸통 (화살표 아래)

  // 격자 밖으로 나가는 부분이 잘려 보이도록 클리핑
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(offX - 14, offY - 14, cell * COLS + 28, cell * ROWS + 28, 14);
  ctx.clip();
  for (const s of snakes) drawSnake(s);
  ctx.restore();

  drawPipes(true);  // 파이프 윤곽·내부 (화살표 위 — 관 속을 지나는 느낌)
  drawPipeMouths(); // 각 입구의 둥근 타원 마개 (원통 관 입구)
  drawPortals();    // 포털 고리 (머리가 구멍으로 빨려드는 느낌)
  drawFx();
  ctx.restore();

  requestAnimationFrame(frame);
}

window.addEventListener('resize', resize);
resize();
boot();  // 일반 모드면 저장된 레벨 이어하기, 타임어택이면 새 런
requestAnimationFrame(frame);

// 테스트용 훅
window.__game = {
  snakes: () => snakes,
  occ: () => occ,
  size: () => ({cols: COLS, rows: ROWS}),
  level: () => level,
  stats: () => ({moves, budget, score, totalScore, combo, stars: starsFor(), timeAttack, timeLeft, gameOver, bestScore, bestTaLevel}),
  setLevel: (lv) => { level = lv; newGame(); },
  setTimeAttack: (on) => { timeAttack = on; renderModeBtn(); startRun(); },
  setTimeLeft: (s) => { timeLeft = s; },
  terrain: () => terrain,
  portals: () => portals,
  pipes: () => pipes,
  traceRay: (r, c, dr, dc) => traceRay({r, c}, {dr, dc}),
  canExit: (id) => checkExit(snakes[id], id, occ).ok,
  clickCell: (r, c) => {
    const rect = cv.getBoundingClientRect();
    onClick({clientX: rect.left + offX + (c + 0.5) * cell, clientY: rect.top + offY + (r + 0.5) * cell});
  },
};
</script>
</body>
