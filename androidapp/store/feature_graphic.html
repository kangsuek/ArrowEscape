<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0e0f16; }
  #fg {
    width: 1024px; height: 500px; position: relative; overflow: hidden;
    background: radial-gradient(circle at 30% 35%, #262b42 0%, #1b1d28 55%, #14151e 100%);
    display: flex; align-items: center; justify-content: center; gap: 56px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .arrow-bg { position: absolute; opacity: 0.10; }
  .icon {
    width: 220px; height: 220px; border-radius: 48px; background: #1b1d28;
    box-shadow: 0 18px 60px rgba(0,0,0,0.55), 0 0 0 2px rgba(141,240,213,0.15);
    display: flex; align-items: center; justify-content: center;
  }
  .icon svg { width: 150px; height: 150px; }
  .textcol { display: flex; flex-direction: column; gap: 14px; }
  .title {
    font-size: 76px; font-weight: 800; color: #f0f2f8; letter-spacing: 1px;
    text-shadow: 0 0 40px rgba(141,240,213,0.35);
  }
  .title span { color: #8df0d5; }
  .tagline { font-size: 26px; color: #aab0c5; font-weight: 500; }
  .dots { display: flex; gap: 10px; margin-top: 6px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; }
</style>
</head>
<body>
<div id="fg">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 6 H12 V4 L18 8 L12 12 V10 H6 V16 H10 V14 L16 18 L10 22 V20 H4 Z"
        fill="none" stroke="#8df0d5" stroke-width="0"/>
      <path d="M3 7 L11 7" stroke="#9257d6" stroke-width="3.4" fill="none"/>
      <path d="M9 3 L13.5 7 L9 11" stroke="#9257d6" stroke-width="3.4" fill="none"/>
      <path d="M11 7 L11 12 L5 12 L5 19" stroke="#8df0d5" stroke-width="3.4" fill="none"/>
      <path d="M5 19 L15 19" stroke="#8df0d5" stroke-width="3.4" fill="none"/>
      <path d="M15 19 L15 12 L20 12" stroke="#c73a6a" stroke-width="3.4" fill="none"/>
      <path d="M17.5 9.5 L21 12 L17.5 14.5" stroke="#c73a6a" stroke-width="3.4" fill="none"/>
    </svg>
  </div>
  <div class="textcol">
    <div class="title">ARROW<br><span>ESCAPE</span></div>
    <div class="tagline">Untangle the arrows. Clear every level.</div>
    <div class="dots">
      <div class="dot" style="background:#8df0d5"></div>
      <div class="dot" style="background:#9257d6"></div>
      <div class="dot" style="background:#c73a6a"></div>
      <div class="dot" style="background:#5aa233"></div>
      <div class="dot" style="background:#5bc8e8"></div>
    </div>
  </div>
</div>
</body>
</html>
